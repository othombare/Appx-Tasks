<!DOCTYPE html>
<html>
<head>
    <title>Simple Shop</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:40px;
        }

        h1{
            margin-bottom:30px;
        }

        .products{
            display:flex;
            gap:30px;
            margin-bottom:40px;
        }

        .card{
            background:white;
            width:260px;
            padding:20px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card img{
            width:180px;
            height:180px;
            object-fit:cover;
        }

        .card h3{
            margin:15px 0 5px;
        }

        .price{
            margin-bottom:15px;
            font-weight:bold;
        }

        button{
            padding:6px 12px;
            border-radius:5px;
            border:1px solid #999;
            cursor:pointer;
            background:#f0f0f0;
        }

        button:hover{
            background:#ddd;
        }

        .cart{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .cart-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 0;
            border-bottom:1px solid #eee;
        }

        .quantity-controls{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .total{
            font-weight:bold;
            margin-top:20px;
            font-size:18px;
        }
    </style>
</head>

<body>

<h1>Simple Shop</h1>

<div class="products">

    <div class="card">
        <img src="tshirt.webp">
        <h3>T-Shirt</h3>
        <div class="price">$19.99</div>
        <button onclick="addToCart('T-Shirt', 19.99)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="jeans.jpg">
        <h3>Jeans</h3>
        <div class="price">$49.99</div>
        <button onclick="addToCart('Jeans', 49.99)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="shoes.jpg">
        <h3>Sneakers</h3>
        <div class="price">$79.99</div>
        <button onclick="addToCart('Sneakers', 79.99)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="hat.jpg">
        <h3>Hat</h3>
        <div class="price">$24.99</div>
        <button onclick="addToCart('Hat', 24.99)">Add to Cart</button>
    </div>

</div>

<div class="cart">
    <h2>Shopping Cart</h2>
    <div id="cartItems"></div>
    <div class="total">Total: $<span id="total">0.00</span></div>
</div>

<script>
    let cart = [];

    function addToCart(name, price) {
        let existingItem = cart.find(item => item.name === name);

        if (existingItem) {
            existingItem.quantity++;
        } else {
            cart.push({ name, price, quantity: 1 });
        }

        updateCart();
    }

    function updateCart() {
        let cartContainer = document.getElementById("cartItems");
        cartContainer.innerHTML = "";

        let total = 0;

        cart.forEach((item, index) => {
            total += item.price * item.quantity;

            cartContainer.innerHTML += `
                <div class="cart-item">
                    <div>${item.name} - $${item.price}</div>
                    <div class="quantity-controls">
                        <button onclick="decreaseQty(${index})">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="increaseQty(${index})">+</button>
                        <button onclick="removeItem(${index})">Remove</button>
                    </div>
                </div>
            `;
        });

        document.getElementById("total").innerText = total.toFixed(2);
    }

    function increaseQty(index) {
        cart[index].quantity++;
        updateCart();
    }

    function decreaseQty(index) {
        if (cart[index].quantity > 1) {
            cart[index].quantity--;
        } else {
            cart.splice(index, 1);
        }
        updateCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCart();
    }
</script>

</body>
</html>
