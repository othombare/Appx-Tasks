<!DOCTYPE html>
<html>
<head>
<title>Image Carousel</title>

<style>

body{
    font-family:Arial;
}

.carousel{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin-top:50px;
}

button{
    padding:12px 18px;
    font-size:22px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background-color:#333;
    color:white;
}

button:hover{
    background-color:#555;
}

.image-container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

img{
    border-radius:10px;
}
.dots{
    display:flex;
    justify-content:center;
    margin-top:15px;
    gap:8px;
}

.dot{
    height:12px;
    width:12px;
    border-radius:50%;
    background-color:gray;
    cursor:pointer;
}

.active{
    background-color:blue;
}
</style>
</head>

<body>

<h1 style="text-align:center;">Image Carousel</h1>

<div class="carousel">

<button onclick="prevImage()">❮</button>

<div class="image-container">
<img id="carouselImage"
src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600"
width="500">

<p id="imageName" style="font-size:18px; margin-top:10px;">
Mountain View
</p>
</div>

<button onclick="nextImage()">❯</button>

</div>
<div id="dotsContainer" class="dots"></div>
<div style="display:flex; justify-content:center;align-items: center; margin-top:20px;">
<button id="autoBtn" onclick="toggleAutoplay()" style="background-color: blue;">Start Auto Play </button>
</div>
<script>

const images = [

{
url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600",
name: "Mountain View"
},

{
url: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=600",
name: "Beautiful Valley"
},

{
url: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600",
name: "Forest Landscape"
}

];
const dotsContainer = document.getElementById("dotsContainer");

images.forEach((img, i) => {

    const dot = document.createElement("div");
    dot.classList.add("dot");

    dot.addEventListener("click", () => {
        index = i;
        showImage();
    });

    dotsContainer.appendChild(dot);

});

let index = 0;

function showImage(){

document.getElementById("carouselImage").src = images[index].url;
document.getElementById("imageName").innerText = images[index].name;

const dots = document.querySelectorAll(".dot");

dots.forEach(dot => dot.classList.remove("active"));

dots[index].classList.add("active");

}

function nextImage(){
index = (index + 1) % images.length;
showImage();
}

function prevImage(){
index = (index - 1 + images.length) % images.length;
showImage();
}
let autoplay = null;
let isPlaying = false;

function toggleAutoplay(){

    const btn = document.getElementById("autoBtn");

    if(!isPlaying){
        autoplay = setInterval(nextImage, 3000);
        btn.innerText = "Stop Autoplay ⏸";
        isPlaying = true;
    } else {
        clearInterval(autoplay);
        btn.innerText = "Start Autoplay ▶";
        isPlaying = false;
    }

}

</script>

</body>
</html>
